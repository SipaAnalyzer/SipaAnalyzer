    <rect x="372" y="276" width="46" height="50" rx="8" fill="url(#green)"/>
    <text x="395" y="309" text-anchor="middle" fill="white" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="800">X</text>
    <text x="486" y="294" text-anchor="middle" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19" font-weight="700">Fichier Excel</text>
