  <text x="1338" y="456" fill="#34D399" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700">Oui</text>

  <path d="M1390 306H1430C1444 306 1454 318 1454 332V640C1454 656 1442 668 1426 668H612C596 668 584 656 584 640V556C584 540 596 528 612 528H680" stroke="#F87171" stroke-width="5" stroke-linecap="round"/>
