    <text x="1282" y="571" text-anchor="middle" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">commercialisation</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="680" y="504" width="300" height="104" rx="18" fill="#10151F" stroke="#263244"/>
    <circle cx="720" cy="556" r="22" fill="url(#red)"/>
    <path d="M712 548L728 564M728 548L712 564" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <text x="862" y="542" text-anchor="middle" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700">Mise en surveillance</text>
