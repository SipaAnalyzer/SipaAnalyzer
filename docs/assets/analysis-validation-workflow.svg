<svg width="1500" height="760" viewBox="0 0 1500 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="760" rx="28" fill="#0F1117"/>
  <rect x="42" y="42" width="1416" height="676" rx="24" fill="#151923" stroke="#2B3242"/>

  <text x="750" y="94" text-anchor="middle" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700">
    Processus actuel d'analyse et de validation
  </text>
  <text x="750" y="126" text-anchor="middle" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">
