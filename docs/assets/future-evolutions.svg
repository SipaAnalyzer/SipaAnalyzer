    <text x="1140" y="507" text-anchor="middle" fill="#FFFFFF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">Archivage</text>
    <text x="1140" y="556" text-anchor="middle" fill="#E5E7EB" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Cycle de vie des données</text>
    <text x="1140" y="582" text-anchor="middle" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Conservation, restauration, conformité</text>
