<svg width="1400" height="640" viewBox="0 0 1400 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="640" rx="28" fill="#0F1117"/>
  <rect x="42" y="42" width="1316" height="556" rx="24" fill="#151923" stroke="#2B3242"/>

  <text x="700" y="96" text-anchor="middle" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700">
    Architecture cible
  </text>
  <text x="700" y="128" text-anchor="middle" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">
