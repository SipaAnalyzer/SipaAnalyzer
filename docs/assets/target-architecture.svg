    <circle cx="217" cy="290" r="38" fill="url(#userGrad)"/>
    <path d="M217 268C228 268 236 276 236 287C236 298 228 306 217 306C206 306 198 298 198 287C198 276 206 268 217 268Z" fill="white"/>
    <path d="M191 335C197 317 207 311 217 311C227 311 237 317 243 335" stroke="white" stroke-width="7" stroke-linecap="round"/>
    <text x="217" y="374" text-anchor="middle" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="700">Navigateur</text>
    <text x="217" y="402" text-anchor="middle" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Utilisateur</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="414" y="234" width="250" height="190" rx="22" fill="#10151F" stroke="#263244"/>
    <rect x="494" y="266" width="90" height="66" rx="10" fill="url(#appGrad)"/>
    <rect x="506" y="278" width="66" height="36" rx="5" stroke="white" stroke-width="5"/>
    <path d="M512 342H566" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <text x="539" y="374" text-anchor="middle" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="700">Application web</text>
    <text x="539" y="402" text-anchor="middle" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">React / Vite</text>
  </g>

