  <path d="M374 313L390 329L374 345" stroke="#64748B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M664 329H708" stroke="#64748B" stroke-width="5" stroke-linecap="round"/>
  <path d="M696 313L712 329L696 345" stroke="#64748B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M986 329H1030" stroke="#64748B" stroke-width="5" stroke-linecap="round"/>
  <path d="M1018 313L1034 329L1018 345" stroke="#64748B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="226" y="498" width="948" height="48" rx="24" fill="#0B1220" stroke="#263244"/>
  <text x="700" y="528" text-anchor="middle" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">
