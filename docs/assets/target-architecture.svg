    <circle cx="861" cy="300" r="42" fill="url(#supabaseGrad)"/>
    <path d="M842 318L864 276L882 318H842Z" fill="white"/>
    <text x="861" y="374" text-anchor="middle" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="700">Supabase</text>
    <text x="861" y="402" text-anchor="middle" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Auth, RLS, Edge Functions</text>
  </g>

  <g filter="url(#shadow)">
