<svg width="1300" height="720" viewBox="0 0 1300 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1300" height="720" rx="28" fill="#0F1117"/>
  <rect x="42" y="42" width="1216" height="636" rx="24" fill="#151923" stroke="#2B3242"/>

  <text x="650" y="98" text-anchor="middle" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700">
    Contraintes principales du projet
  </text>
  <text x="650" y="130" text-anchor="middle" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">
    SIPA Analyzer doit répondre à quatre exigences structurantes
  </text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="center" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#059669"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#B91C1C"/>
      <stop offset="1" stop-color="#F87171"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow)">
    <circle cx="650" cy="370" r="96" fill="#10151F" stroke="#334155" stroke-width="2"/>
    <circle cx="650" cy="370" r="62" fill="url(#center)"/>
    <text x="650" y="361" text-anchor="middle" fill="white" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">SIPA</text>
    <text x="650" y="389" text-anchor="middle" fill="white" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">Analyzer</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="135" y="205" width="340" height="150" rx="20" fill="#10151F" stroke="#263244"/>
    <circle cx="180" cy="252" r="26" fill="url(#blue)"/>
    <path d="M168 252H192M180 240V264" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <text x="225" y="250" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Accessibilité</text>
    <text x="160" y="302" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Accès web depuis plusieurs postes</text>
    <text x="160" y="328" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Interface disponible sans fichier local</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="825" y="205" width="340" height="150" rx="20" fill="#10151F" stroke="#263244"/>
    <circle cx="870" cy="252" r="26" fill="url(#green)"/>
    <path d="M858 252H882M858 242H882M858 262H882" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <text x="915" y="250" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Centralisation</text>
    <text x="850" y="302" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Données regroupées dans Supabase</text>
    <text x="850" y="328" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Moins de doublons et versions Excel</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="135" y="455" width="340" height="150" rx="20" fill="#10151F" stroke="#263244"/>
    <circle cx="180" cy="502" r="26" fill="url(#red)"/>
    <path d="M180 488L194 494V505C194 516 188 523 180 526C172 523 166 516 166 505V494L180 488Z" stroke="white" stroke-width="4" stroke-linejoin="round"/>
    <text x="225" y="500" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Sécurité</text>
    <text x="160" y="552" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Rôles, permissions et RLS</text>
    <text x="160" y="578" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Logs, sauvegardes et restauration</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="825" y="455" width="340" height="150" rx="20" fill="#10151F" stroke="#263244"/>
    <circle cx="870" cy="502" r="26" fill="url(#purple)"/>
    <path d="M858 512L870 490L882 512M864 504H876" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="915" y="500" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Évolutivité</text>
    <text x="850" y="552" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Architecture extensible</text>
    <text x="850" y="578" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Ajout futur IA, Slack, workflows</text>
  </g>

  <path d="M474 280C548 282 594 306 620 326" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M826 280C752 282 706 306 680 326" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M474 530C548 528 594 494 622 430" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
  <path d="M826 530C752 528 706 494 678 430" stroke="#64748B" stroke-width="4" stroke-linecap="round"/>
</svg>
