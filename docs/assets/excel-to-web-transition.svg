<svg width="1400" height="620" viewBox="0 0 1400 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="620" rx="28" fill="#0F1117"/>
  <rect x="42" y="42" width="1316" height="536" rx="24" fill="#151923" stroke="#2B3242"/>

  <text x="700" y="96" text-anchor="middle" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="700">
    Transition des données financières
  </text>
  <text x="700" y="128" text-anchor="middle" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">
    Excel existant → import / reprise des données → application web centralisée
  </text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <linearGradient id="excelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F8A5F"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="importGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C77806"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="webGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow)">
    <rect x="86" y="188" width="330" height="270" rx="22" fill="#10151F" stroke="#263244"/>
    <rect x="112" y="214" width="74" height="74" rx="18" fill="url(#excelGrad)"/>
    <text x="149" y="260" text-anchor="middle" fill="white" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="800">X</text>
    <text x="112" y="326" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Excel existant</text>
    <text x="112" y="362" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Tableaux financiers historiques</text>
    <text x="112" y="390" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Hypothèses, loyers, dette, IRR</text>
    <text x="112" y="418" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Données dispersées par fichier</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="535" y="188" width="330" height="270" rx="22" fill="#10151F" stroke="#263244"/>
    <rect x="561" y="214" width="74" height="74" rx="18" fill="url(#importGrad)"/>
    <path d="M598 234V266M598 266L584 252M598 266L612 252" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="561" y="326" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Import / reprise</text>
    <text x="561" y="362" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Lecture du fichier Excel</text>
    <text x="561" y="390" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Mapping des champs financiers</text>
    <text x="561" y="418" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Contrôle et normalisation des données</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="984" y="188" width="330" height="270" rx="22" fill="#10151F" stroke="#263244"/>
    <rect x="1010" y="214" width="74" height="74" rx="18" fill="url(#webGrad)"/>
    <rect x="1029" y="232" width="36" height="28" rx="4" stroke="white" stroke-width="5"/>
    <path d="M1034 270H1060" stroke="white" stroke-width="5" stroke-linecap="round"/>
    <text x="1010" y="326" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="700">Application web</text>
    <text x="1010" y="362" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Base centralisée Supabase</text>
    <text x="1010" y="390" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Analyses, exports PDF, supervision</text>
    <text x="1010" y="418" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Traçabilité, rôles et sauvegardes</text>
  </g>

  <path d="M436 323H505" stroke="#64748B" stroke-width="5" stroke-linecap="round"/>
  <path d="M492 307L508 323L492 339" stroke="#64748B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M885 323H954" stroke="#64748B" stroke-width="5" stroke-linecap="round"/>
  <path d="M941 307L957 323L941 339" stroke="#64748B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="276" y="494" width="848" height="48" rx="24" fill="#0B1220" stroke="#263244"/>
  <text x="700" y="525" text-anchor="middle" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">
    Objectif : fiabiliser les données, réduire les saisies manuelles et centraliser l'exploitation
  </text>
</svg>
